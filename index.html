                                    Welcome to my website, it includes a whimsical drawing of a sun with a human face,
                                    surrounded by petal-like shapes and a sprouting flower above. I found the 
                                    illustration in a book with poems by Josef Eichendorff with the title 
                                    'Wanderlieder'. Renate Totzke-Israel is the artist who made the illustrations.
                                    I recently read one of them out loud on top of a hill in 
                                    the woods, close where my parents live. I read it out towards the valley opening 
                                    up in front of me, for the people following their daily live-routines down 
                                    there. It’s a romantic gesture, Joseph Eichendorff was a romantic poet.
